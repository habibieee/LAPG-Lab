version: '3.8'
services:
  alloy:
      image: grafana/alloy:latest
      container_name: alloy_agent
      restart: unless-stopped
      user: root
      ports:
        - "12345:12345"
      volumes:
        - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
        - mssql_data:/var/opt/mssql
      command:
        - run
        - --server.http.listen-addr=0.0.0.0:12345
        - --storage.path=/var/lib/alloy/data
        - /etc/alloy/config.alloy
      depends_on:
        - mssql
        - prometheus
        - loki
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_core
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'
  loki:
    image: grafana/loki:latest
    container_name: loki_core
    restart: unless-stopped
    user: "0:0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_ui
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123!
      - GF_SECURITY_ADMIN_USER=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboard:/grafana-dashboards:ro
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
      - loki
    user: "472"
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=admin123 # Gunakan password yang kuat
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql:ro
volumes:
  mssql_data:
  mssql_logs:
  prom_data:
  loki_data:
  grafana_data: